# Main configuration settings for rule generation
# Format: KEY=VALUE (no spaces around =)

# Rule generation parameters
FORMAT_GQ_THRESHOLD=19
RULES_INDEX=44
DATE_STAMP=auto

# File paths (relative to input directory)
MASTER_GENE_LIST_FILE=master_gene_list.xlsx
VARIANT_LIST_FILE=variant_list.xlsx

# Asset directories (moved from config to assets)
# These paths are set in paths.conf and referenced here for documentation
# RULES_ASSETS_DIR points to assets/rules/
# SPECIAL_CASES_ASSETS_DIR points to assets/special_cases/

# Output settings
OUTPUT_PREFIX=rules_file_from_carrier_list
CREATE_JSON_OUTPUTS=true
CREATE_ANALYSIS=true

# Development settings
SKIP_RULES_CHECKER=false  # Set to true to skip time-consuming rules validation during development

# Gene exclusions control
ENABLE_GENE_EXCLUSIONS=false  # Set to true to enable gene exclusions filtering (important for production)

# cID assignment strategy
ENABLE_LEGACY_CID_ASSIGNMENT=true  # Set to true for V43-style gene-disease combination cIDs

# Library management  
LIBRARY_KEEP_VERSIONS=0
AUTO_ARCHIVE=true

# Validation rules
CHEK2_VALIDATION_RULES=true
PROFICIENCY_TRAINING_RULES=true

# Required R packages for prerequisite checking
# Space-separated list of R packages that must be installed
R_PKGS_USED="openxlsx jsonlite knitr"

# Required system commands
# Space-separated list of commands that must be available in PATH
SYSTEM_COMMANDS_REQUIRED="Rscript"

# S3 deployment settings
# Default S3 version for deployment (can be overridden via command line)
S3_VERSION=""  # Leave empty for no default S3 deployment
